<!DOCTYPE html>
<html>
<head>
    <title>Startup Success Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>🚀 Startup Success Predictor</h1>

<form action="/predict" method="post">

<h2>Basic Information</h2>

<input type="number" step="any" name="age_startup_year" placeholder="Startup Age (Years)" required>
<input type="number" step="any" name="funding_total_usd" placeholder="Total Funding (USD)" required>
<input type="number" name="funding_rounds" placeholder="Funding Rounds" required>
<input type="number" name="milestones" placeholder="Milestones Achieved" required>
<input type="number" name="avg_participants" placeholder="Avg Participants" required>
<input type="number" name="relationships" placeholder="Relationships Count" required>

<h2>Industry</h2>
<select name="category">
    <option value="software">Software</option>
    <option value="web">Web</option>
    <option value="mobile">Mobile</option>
    <option value="ecommerce">E‑Commerce</option>
    <option value="biotech">Biotech</option>
    <option value="enterprise">Enterprise</option>
    <option value="advertising">Advertising</option>
    <option value="gamesvideo">Games Video</option>
    <option value="consulting">Consulting</option>
    <option value="other">Other</option>
</select>

<h2>Investments</h2>

<label>VC Funding</label>
<select name="has_VC">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Angel Funding</label>
<select name="has_angel">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Seed Funding</label>
<select name="has_Seed">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<br><br>
<button type="submit">Predict Success</button>

</form>

</div>

</body>
</html>
